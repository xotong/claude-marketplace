# GitLab CI/CD Component — Skill Safety Scanner
#
# Usage in a tenant's .gitlab-ci.yml — no inputs needed:
#
#   include:
#     - component: gitlab.company.com/skillshub/claude-marketplace/skill-scanner@~latest
#
# The only thing tenants must configure is one masked CI/CD variable in their
# project's Settings → CI/CD → Variables:
#
#   LITELLM_API_KEY   (masked, protected)   API key for the internal LLM gateway
#
# Endpoint and model are fixed here by the Platform Team. LiteLLM handles
# model routing centrally — tenants never need to know or change these.
#
# Optional inputs (override only if you have a specific need):
#   stage        GitLab CI stage (default: test)
#   skills_dir   Subdirectory to scan (default: . = repo root)
#   threshold    Pass score 0-1 (default: 0.85; prefer scanner-config.yaml instead)
#   fail_on_review  Treat REVIEW_NEEDED as failure (default: false)
#   image        Pin to a specific scanner image tag (default: latest)

spec:
  inputs:
    stage:
      type: string
      default: "test"
      description: "GitLab CI stage to run the scan in."
    skills_dir:
      type: string
      default: "."
      description: "Subdirectory to scan recursively for SKILL.md files. Defaults to repo root."
    threshold:
      type: number
      default: 0.85
      description: "Override the safety threshold. Prefer setting this in scanner-config.yaml instead."
    fail_on_review:
      type: boolean
      default: false
      description: "Treat REVIEW_NEEDED verdict as a pipeline failure."
    image:
      type: string
      default: "registry.gitlab.company.com/skillshub/claude-marketplace/skill-scanner:latest"
      description: "Pin to a specific image tag or digest for reproducible pipelines."

---

skill-safety-scan:
  stage: $[[ inputs.stage ]]
  image:
    name: $[[ inputs.image ]]
    # Reset the image's ENTRYPOINT so GitLab CI can run the script block normally.
    entrypoint: [""]
  variables:
    # Fixed by the Platform Team — tenants do not configure these.
    SCANNER_ENDPOINT: "https://litellm.company.com/v1"
    SCANNER_MODEL: "kimi-k2"
    # Tenants set LITELLM_API_KEY as a masked CI/CD variable in project settings.
    SCANNER_API_KEY: $LITELLM_API_KEY
    SCANNER_THRESHOLD: "$[[ inputs.threshold ]]"
    SCANNER_SKILLS_DIR: "$CI_PROJECT_DIR/$[[ inputs.skills_dir ]]"
    # Reports always go to a fixed output dir — never into the repo working tree.
    SCANNER_OUTPUT_DIR: "$CI_PROJECT_DIR/.skill-scanner-output"
    SCANNER_FAIL_ON_REVIEW: "$[[ inputs.fail_on_review ]]"
  script:
    - python /scanner/scanner.py
  artifacts:
    # JUnit report: skill results appear as named test cases in the MR Tests tab.
    reports:
      junit: "$CI_PROJECT_DIR/.skill-scanner-output/scan-results.xml"
    # JSON report: downloadable from the pipeline artifacts panel.
    paths:
      - "$CI_PROJECT_DIR/.skill-scanner-output/"
    # Always upload — even on failure — so you can review what blocked the pipeline.
    when: always
    expire_in: 30 days
  allow_failure: false
