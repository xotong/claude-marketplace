# CI for the skillshub/claude-marketplace repo itself.
# Runs on every MR and push to main.
#
# Jobs:
#   validate-json     — Ensures marketplace.json and all plugin.json files parse cleanly.
#   scan-platform-verified — Runs the skill safety scanner against plugins/platform-verified/
#                            so the Platform Team dogfoods their own tool.

stages:
  - validate
  - scan

# ── JSON validation ───────────────────────────────────────────────────────────

validate-json:
  stage: validate
  image: python:3.12-slim
  script:
    - |
      set -e
      echo "Validating .claude-plugin/marketplace.json..."
      python3 -c "import json, sys; json.load(open('.claude-plugin/marketplace.json')); print('  OK')"

      echo "Validating all plugin.json files..."
      find plugins -name 'plugin.json' -path '*/.claude-plugin/*' | sort | while read f; do
        python3 -c "import json, sys; json.load(open('$f')); print('  OK: $f')"
      done

      echo "All JSON files valid."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Skill safety scan on platform-verified ───────────────────────────────────
# Platform Team dogfoods the scanner against the skills they officially endorse.
# This job is skipped if plugins/platform-verified/skills/ has no SKILL.md files yet.

include:
  - component: gitlab.company.com/skillshub/claude-marketplace/skill-scanner@~latest
    inputs:
      stage: "scan"
      skills_dir: "plugins/platform-verified"
      # Be strict for platform-verified — REVIEW_NEEDED blocks merge.
      fail_on_review: true
      threshold: 0.90

# Override the job's rules and script so it only runs when platform-verified
# SKILL.md files change. On MRs, scan only the changed files (fast). On push
# to main, scan everything (no SCANNER_FILES set = full scan).
#
# Note: GitLab CI variables: does not evaluate shell commands — SCANNER_FILES
# must be set inside the script: block, not via variables:.
skill-safety-scan:
  variables:
    # Ensure a full clone so git diff against the target branch ref works.
    GIT_DEPTH: "0"
  script:
    - |
      # On MR pipelines, restrict to only the SKILL.md files touched in this MR.
      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
        # Fetch the target branch so the diff ref resolves.
        git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
        # Prepend CI_PROJECT_DIR so paths are absolute — scanner.py resolves
        # relative paths against SCANNER_SKILLS_DIR, which would double-up the prefix.
        CHANGED=$(git diff --name-only \
          "origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}...HEAD" \
          | grep '^plugins/platform-verified/.*SKILL\.md$' \
          | sed "s|^|${CI_PROJECT_DIR}/|" \
          | tr '\n' ',' | sed 's/,$//')
        if [ -n "$CHANGED" ]; then
          export SCANNER_FILES="$CHANGED"
          echo "Targeted scan: $SCANNER_FILES"
        else
          echo "No changed SKILL.md files detected — nothing to scan."
          exit 0
        fi
      else
        echo "Push to main — running full scan."
      fi
      python /scanner/scanner.py
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - plugins/platform-verified/**/*SKILL.md
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - plugins/platform-verified/**/*SKILL.md
    - when: never
